name: Build APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract
        run: unzip habit-passport-slim.zip -d src

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install
        working-directory: src/habit-passport-project
        run: npm install

      - name: Build Web
        working-directory: src/habit-passport-project
        run: npm run build

      - name: Add Android Platform
        working-directory: src/habit-passport-project
        run: |
          rm -rf android
          npx cap add android

      - name: Sync
        working-directory: src/habit-passport-project
        run: npx cap sync android

      - name: Build APK
        working-directory: src/habit-passport-project/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Find APK
        run: find src -name "app-debug.apk" -exec cp {} app.apk \;

      - uses: actions/upload-artifact@v4
        with:
          name: HabitPassport
          path: app.apk
